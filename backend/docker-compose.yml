services:
  nginx-proxy:
    image: nginxproxy/nginx-proxy:1.6
    container_name: nginx-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - proxy_conf:/etc/nginx/conf.d
      - proxy_vhost:/etc/nginx/vhost.d
      - proxy_html:/usr/share/nginx/html
      - proxy_certs:/etc/nginx/certs:ro
      - /var/run/docker.sock:/tmp/docker.sock:ro
    networks:
      - backend

  acme-companion:
    image: nginxproxy/acme-companion:2.4
    container_name: nginx-proxy-acme
    restart: unless-stopped
    depends_on:
      - nginx-proxy
    environment:
      - DEFAULT_EMAIL=${LETSENCRYPT_EMAIL}
      - NGINX_PROXY_CONTAINER=nginx-proxy
    volumes:
      - proxy_conf:/etc/nginx/conf.d
      - proxy_vhost:/etc/nginx/vhost.d
      - proxy_html:/usr/share/nginx/html
      - proxy_certs:/etc/nginx/certs
      - acme_state:/etc/acme.sh
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - backend

  # backend.lemurdaniel.de selbst hat keinen eigenen Service -> Besucher direkt
  # auf die Hauptseite umleiten. Subdomains wie example.backend.lemurdaniel.de
  # haben einen eigenen, spezifischeren VIRTUAL_HOST und werden davon nicht
  # berührt, da nginx-proxy den am besten passenden Host wählt.
  root-redirect:
    image: nginx:alpine
    container_name: backend-root-redirect
    restart: unless-stopped
    volumes:
      - ./root-redirect/default.conf:/etc/nginx/conf.d/default.conf:ro
    environment:
      - VIRTUAL_HOST=backend.lemurdaniel.de
      - VIRTUAL_PORT=80
      - LETSENCRYPT_HOST=backend.lemurdaniel.de
      - LETSENCRYPT_EMAIL=${LETSENCRYPT_EMAIL}
    networks:
      - backend

networks:
  backend:
    name: backend

volumes:
  proxy_conf:
  proxy_vhost:
  proxy_html:
  proxy_certs:
  acme_state:
