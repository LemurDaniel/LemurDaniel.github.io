services:
  nginx-proxy:
    image: nginxproxy/nginx-proxy:1.6
    container_name: nginx-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - proxy_conf:/etc/nginx/conf.d
      - proxy_vhost:/etc/nginx/vhost.d
      - proxy_html:/usr/share/nginx/html
      - proxy_certs:/etc/nginx/certs:ro
      - /var/run/docker.sock:/tmp/docker.sock:ro
    networks:
      - backend

  acme-companion:
    image: nginxproxy/acme-companion:2.4
    container_name: nginx-proxy-acme
    restart: unless-stopped
    depends_on:
      - nginx-proxy
    environment:
      - DEFAULT_EMAIL=${LETSENCRYPT_EMAIL}
      - NGINX_PROXY_CONTAINER=nginx-proxy
    volumes:
      - proxy_conf:/etc/nginx/conf.d
      - proxy_vhost:/etc/nginx/vhost.d
      - proxy_html:/usr/share/nginx/html
      - proxy_certs:/etc/nginx/certs
      - acme_state:/etc/acme.sh
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - backend

  # Fängt jede Subdomain von lemurdaniel.de ab, für die kein eigener Service
  # registriert ist, und leitet auf die Hauptseite um. Ein Service mit
  # spezifischerem VIRTUAL_HOST (z.B. example.lemurdaniel.de) hat bei nginx
  # immer Vorrang vor diesem Wildcard-Catch-all.
  #
  # Bewusst KEIN LETSENCRYPT_HOST hier: Let's Encrypt vergibt Wildcard-Zertifikate
  # nur über die DNS-01-Challenge, wir nutzen aber HTTP-01. Ein Versuch, per
  # HTTP-01 ein Zertifikat für *.lemurdaniel.de zu holen, würde dauerhaft fehlschlagen
  # und könnte durch wiederholte Fehlversuche das Let's-Encrypt-Rate-Limit treffen.
  # Für Subdomains ohne eigenen registrierten Service zeigt der Browser bei HTTPS
  # deshalb eine Zertifikatswarnung, bevor der Redirect greift; HTTP (Port 80)
  # funktioniert davon unabhängig sauber. Subdomains mit eigenem Service (siehe
  # services/) bekommen wie gewohnt ihr eigenes echtes Zertifikat.
  root-redirect:
    image: nginx:alpine
    container_name: root-redirect
    restart: unless-stopped
    volumes:
      - ./root-redirect/default.conf:/etc/nginx/conf.d/default.conf:ro
    environment:
      - VIRTUAL_HOST=*.lemurdaniel.de
      - VIRTUAL_PORT=80
    networks:
      - backend

networks:
  backend:
    name: backend

volumes:
  proxy_conf:
  proxy_vhost:
  proxy_html:
  proxy_certs:
  acme_state:
