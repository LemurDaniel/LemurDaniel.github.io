<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Doodle Drawing | LemurDaniel</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // https://github.com/rafgraph/spa-github-pages
      // Rewrites a 404'd deep link (e.g. /app/game) into a query-string
      // redirect back to /app/, which index.html then decodes and restores.
      var pathSegmentsToKeep = 1; // keep "/app"

      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1 + pathSegmentsToKeep).split('/').join('~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
  </body>
</html>
